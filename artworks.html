<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Artworks | YiiArt</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
  <style>
    .artworks-layout { display: grid; grid-template-columns: 280px 1fr; gap: 0; min-height: calc(100vh - 80px); padding-top: 80px; }
    .artworks-main { padding: var(--space-2xl); background: var(--color-gallery-white); }
    .artworks-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-xl); flex-wrap: wrap; gap: var(--space-md); }
    .artworks-count { font-size: var(--text-sm); color: var(--color-warm-gray); }
    .artworks-count strong { color: var(--color-ink-black); }
    .artworks-sort { display: flex; align-items: center; gap: var(--space-md); }
    .artworks-sort label { font-size: var(--text-sm); color: var(--color-warm-gray); }
    .artworks-sort select { padding: var(--space-sm) var(--space-lg); border: 1px solid var(--color-light-gray); border-radius: var(--radius-md); font-size: var(--text-sm); background: white; cursor: pointer; }
    .artworks-view-toggle { display: flex; gap: var(--space-xs); }
    .view-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--color-light-gray); border-radius: var(--radius-md); background: white; cursor: pointer; transition: all var(--transition-fast); }
    .view-btn:hover, .view-btn--active { background: var(--color-ink-black); border-color: var(--color-ink-black); }
    .view-btn:hover svg, .view-btn--active svg { stroke: white; }
    .view-btn svg { width: 18px; height: 18px; }
    .artworks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-xl); }
    @media (max-width: 1200px) { .artworks-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) {
      .artworks-layout { grid-template-columns: 1fr; }
      .filter-sidebar { display: none; position: fixed; inset: 0; z-index: 300; height: 100vh; }
      .filter-sidebar--open { display: block; }
      .mobile-filter-toggle { display: flex !important; }
    }
    .mobile-filter-toggle { display: none; align-items: center; gap: var(--space-sm); padding: var(--space-sm) var(--space-lg); background: var(--color-ink-black); color: white; border: none; border-radius: var(--radius-md); font-size: var(--text-sm); cursor: pointer; }
    .filter-close { display: none; }
    @media (max-width: 768px) { .filter-close { display: block; width: 100%; padding: var(--space-md); margin-top: var(--space-md); background: var(--color-light-gray); border: none; border-radius: var(--radius-md); font-size: var(--text-sm); cursor: pointer; } }
    .active-filters { display: flex; flex-wrap: wrap; gap: var(--space-sm); margin-bottom: var(--space-lg); }
    .active-filter { display: inline-flex; align-items: center; gap: var(--space-xs); padding: var(--space-xs) var(--space-md); background: var(--color-ink-black); color: white; font-size: var(--text-xs); border-radius: var(--radius-full); }
    .active-filter__remove { cursor: pointer; opacity: 0.7; }
    .active-filter__remove:hover { opacity: 1; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="logo">Yii<span>Art</span></a>
      
      <nav class="nav" aria-label="Primary">
        <a href="artworks.html" class="nav__link nav__link--active" data-i18n="nav.explore">Explore</a>
        <a href="index.html#scenes" class="nav__link" data-i18n="nav.homeScenes">Home Scenes</a>
        <a href="artworks.html?category=abstract" class="nav__link" data-i18n="nav.abstract">Abstract</a>
        <a href="artworks.html?category=texture" class="nav__link" data-i18n="nav.texture">Texture</a>
        <a href="artists.html" class="nav__link" data-i18n="nav.artists">Artists</a>
      </nav>
      
      <div class="nav__actions">
        <div class="lang-switcher" data-lang-switcher></div>
        <button class="icon-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="icon-btn" aria-label="Account">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <button class="icon-btn" aria-label="Cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="icon-btn__badge">2</span>
        </button>
      </div>
    </div>
  </header>

  <main class="artworks-layout">
    <aside class="filter-sidebar" id="filterSidebar">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--space-xl);">
        <h3 style="font-size: var(--text-lg); font-weight: 600;">Filters</h3>
        <a href="#" style="font-size: var(--text-sm); color: var(--color-art-gold);">Clear all</a>
      </div>
      <button class="filter-close" onclick="closeFilters()">Close</button>
    </aside>

    <section class="artworks-main">
      <div class="artworks-header">
        <div style="display:flex; align-items:center; gap:1rem;">
          <button class="mobile-filter-toggle" onclick="toggleFilters()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            Filters
          </button>
          <p class="artworks-count"><strong>248</strong> artworks</p>
        </div>
        <div class="artworks-sort">
          <label>Sort:</label>
          <select>
            <option>Featured</option>
            <option>Newest</option>
            <option>Price: Low to High</option>
            <option>Price: High to Low</option>
          </select>
        </div>
      </div>

      <div class="artworks-grid">
        <a href="artwork-detail.html" class="card">
          <div class="card__image"><img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=600&q=80" alt="Artwork"></div>
          <div class="card__content">
            <p class="card__category">Abstract · Acrylic</p>
            <h4 class="card__title">Twilight Realm III</h4>
            <p class="card__artist">Elena Morozova</p>
            <div class="card__footer"><span class="text-price">¥ 4,800</span><span style="font-size: var(--text-xs); color: var(--color-warm-gray);">60×80cm</span></div>
          </div>
        </a>
      </div>
    </section>
  </main>

  <footer class="footer" style="margin-top: 0;">
    <div class="container">
      <div class="footer__bottom">
        <p class="footer__copyright">© 2024 YiiArt. <span data-i18n="footer.rights">All rights reserved.</span></p>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/i18n.js"></script>
  <script>
    function toggleFilters() { document.getElementById('filterSidebar').classList.toggle('filter-sidebar--open'); }
    function closeFilters() { document.getElementById('filterSidebar').classList.remove('filter-sidebar--open'); }
  </script>
</body>
</html>
